<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Sayfa Bulunamadı | YTK Academy</title>
  <link rel="icon" href="/favicon.png" type="image/png">
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #05020c;
      --bg-2: #090514;
      --purple: #ab7cff;
      --text: #e1deeb;
      --muted: #a29cc2;
      --border: #3e1866;
      --glow: rgba(171, 124, 255, 0.4);
    }
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: "JetBrains Mono", monospace;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
      padding: 20px;
    }
    /* Grid scanline overlay */
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: repeating-linear-gradient(0deg, transparent 0, transparent 2px, rgba(0, 0, 0, 0.15) 3px, transparent 4px);
      z-index: 10;
    }
    .container {
      text-align: center;
      max-width: 600px;
      width: 100%;
      border: 1px solid var(--border);
      background: var(--bg-2);
      padding: 40px 30px;
      border-radius: 12px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8), 0 0 30px rgba(171, 124, 255, 0.05);
      position: relative;
      z-index: 5;
    }
    .icon {
      font-size: 80px;
      color: var(--purple);
      margin-bottom: 20px;
      text-shadow: 0 0 20px var(--glow);
      animation: pulse 2s infinite;
    }
    h1 {
      font-family: "Chakra Petch", sans-serif;
      font-size: 32px;
      font-weight: 700;
      color: #eafff5;
      margin-bottom: 15px;
    }
    .code {
      display: inline-block;
      background: #090514;
      border: 1px solid var(--border);
      padding: 4px 10px;
      border-radius: 4px;
      color: var(--purple);
      font-size: 14px;
      margin-bottom: 25px;
    }
    p {
      color: var(--muted);
      font-size: 16px;
      line-height: 1.6;
      margin-bottom: 30px;
    }
    .btn {
      display: inline-block;
      font-family: "JetBrains Mono", monospace;
      font-size: 15px;
      font-weight: bold;
      color: #05020c;
      background-color: var(--purple);
      padding: 14px 28px;
      text-decoration: none;
      border: none;
      cursor: pointer;
      transition: all 0.2s ease;
      clip-path: polygon(0 0, 100% 0, 100% 70%, calc(100% - 12px) 100%, 0 100%);
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 25px var(--glow);
    }
    .btn:active {
      transform: translateY(0);
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.7; transform: scale(0.95); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">💻</div>
    <h1>Derleme Hatası: Sayfa Bulunamadı</h1>
    <div class="code">ERROR_CODE: 404_PAGE_NOT_FOUND</div>
    <p>Aradığınız dosya, yol veya backend laboratuvarı sunucuda bulunamadı. Bağlantıyı hatalı yazmış veya sayfa yayından kaldırılmış olabilir.</p>
    <a href="/" class="btn">Ana Sayfaya Dön →</a>
  </div>
</body>
</html>

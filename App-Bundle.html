<head>
  <meta charset="UTF-8" />

  <meta name="description" content="siberkampus, CTF görevleri ve gerçek hacking laboratuvarlarıyla sıfırdan siber güvenlik uzmanı olmanı sağlayan uygulamalı eğitim kampüsüdür. Hemen ücretsiz başla." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            mono: ['"JetBrains Mono"', 'ui-monospace', 'monospace'],
            disp: ['"Chakra Petch"', 'system-ui', 'sans-serif'],
          },
        },
      },
    };
  </script>
  <style>
    :root {
      --bg:#020806; --bg-2:#04100a; --surface:#07150e; --border:#103a26;
      --border-soft:#0c2719; --green:#00ff88; --mint:#5cffba;
      --text:#cdeede; --muted:#74998a; --dim:#3d564b; --glow:rgba(0,255,136,.55);
    }
    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      background:var(--bg); color:var(--text);
      font-family:"JetBrains Mono",ui-monospace,monospace;
      font-size:16px; line-height:1.6; overflow-x:hidden; -webkit-font-smoothing:antialiased;
    }
    ::selection{background:var(--green);color:#021008}
    h1,h2,h3{font-family:"Chakra Petch",system-ui,sans-serif;font-weight:700;line-height:1.04;letter-spacing:-.01em}

    /* scanline overlay */
    .scanlines::after{
      content:"";position:fixed;inset:0;pointer-events:none;z-index:60;
      background:repeating-linear-gradient(0deg,transparent 0,transparent 2px,rgba(0,0,0,.18) 3px,transparent 4px);
      mix-blend-mode:multiply;opacity:.5;
    }

    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
    .sk-pulse{animation:pulse 1.6s infinite}

    @keyframes floor{to{background-position:0 48px}}
    .grid-floor{
      position:absolute;left:50%;bottom:-10%;width:240%;height:70%;z-index:0;
      transform:translateX(-50%) perspective(420px) rotateX(62deg);
      background-image:linear-gradient(rgba(0,255,136,.16) 1px,transparent 1px),linear-gradient(90deg,rgba(0,255,136,.16) 1px,transparent 1px);
      background-size:48px 48px;
      -webkit-mask-image:linear-gradient(to top,#000 0%,transparent 75%);
      mask-image:linear-gradient(to top,#000 0%,transparent 75%);
      animation:floor 7s linear infinite;
    }

    /* glitch H1 */
    .glitch{position:relative;color:var(--green);display:inline-block;text-shadow:0 0 32px rgba(0,255,136,.45)}
    .glitch::before,.glitch::after{content:attr(data-text);position:absolute;left:0;top:0;width:100%;overflow:hidden}
    .glitch::before{color:#00e0ff;animation:glitchA 3.4s infinite steps(2,end);clip-path:inset(0 0 55% 0)}
    .glitch::after{color:#ff2e88;animation:glitchB 3.4s infinite steps(2,end);clip-path:inset(55% 0 0 0)}
    @keyframes glitchA{0%,92%,100%{transform:translate(0)}93%{transform:translate(-3px,-1px)}96%{transform:translate(2px,1px)}}
    @keyframes glitchB{0%,92%,100%{transform:translate(0)}93%{transform:translate(3px,1px)}96%{transform:translate(-2px,-1px)}}

    @keyframes blink{50%{opacity:0}}
    .term-cursor{display:inline-block;width:9px;height:16px;background:var(--green);vertical-align:-2px;animation:blink 1s steps(1) infinite}

    /* count-up reveal — VISIBLE is the base state; JS applies the hidden
       pre-animation state so observer/timeout failure never blanks content */
    .reveal{opacity:1;transform:none;transition:opacity .7s cubic-bezier(.2,.7,.2,1),transform .7s cubic-bezier(.2,.7,.2,1)}
    .reveal.reveal-hidden{opacity:0;transform:translateY(26px)}

    .clip-btn{clip-path:polygon(0 0,100% 0,100% 70%,calc(100% - 12px) 100%,0 100%)}

    .sphere-wrap::before{content:"";position:absolute;inset:8%;border-radius:50%;background:radial-gradient(circle at center,rgba(0,255,136,.13),transparent 60%)}

    @media(prefers-reduced-motion:reduce){
      .grid-floor,.glitch::before,.glitch::after{animation:none}
    }
  </style>
</head>

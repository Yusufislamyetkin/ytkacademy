    /* scanline overlay */
    .scanlines::after{

      background:repeating-linear-gradient(0deg,transparent 0,transparent 2px,rgba(0,0,0,.18) 3px,transparent 4px);

    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
    .sk-pulse{animation:pulse 1.6s infinite}

    @keyframes floor{
      from{transform:translateX(-50%) perspective(420px) rotateX(62deg) translateY(0)}
      to{transform:translateX(-50%) perspective(420px) rotateX(62deg) translateY(48px)}
    }
    .grid-floor{
      position:absolute;left:50%;bottom:-10%;width:240%;height:70%;z-index:0;

      animation:floor 7s linear infinite;

    /* glitch H1 */
    .glitch{position:relative;color:var(--green);display:inline-block;text-shadow:0 0 32px rgba(0,255,136,.45)}

    .glitch::before{color:#00e0ff;animation:glitchA 3.4s infinite steps(2,end);clip-path:inset(0 0 55% 0)}
    .glitch::after{color:#ff2e88;animation:glitchB 3.4s infinite steps(2,end);clip-path:inset(55% 0 0 0)}
    @keyframes glitchA{0%,92%,100%{transform:translate(0)}93%{transform:translate(-3px,-1px)}96%{transform:translate(2px,1px)}}
    @keyframes glitchB{0%,92%,100%{transform:translate(0)}93%{transform:translate(3px,1px)}96%{transform:translate(-2px,-1px)}}
